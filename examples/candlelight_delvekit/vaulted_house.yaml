  hook_target: a hidden tyrant
  player_blurb: 'Below the chapel roads, someone once built for order. What remains
    is Vaulted House. Every road into the place promises one kind of profit and another
    kind of trouble. The true pressure comes from something that stalks the halls,
    sealed ways and hidden inner doors, and locals already at knives'' edge. Long
    enough to matter, short enough to think you can finish it. Proper old-school danger:
    one bad turn will not always kill you, but it may own the rest of the night. Go
    down now, because waiting is the same as helping them finish.'
  character_motivation: Interrupt whatever is gathering strength in the black choir
    before it gets worse.
