  name: The Floor That Chooses
  style: caverns
  style_label: flooded natural caverns
  style_pitch: a wet cave site of sinkholes, pale fungus, slick ledges, and black
    water
  subtheme: a drowned ferry route beneath a sinkhole
  skin: candlelight_dungeons
