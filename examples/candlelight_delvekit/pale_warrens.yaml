    zero_stamina: collapse often becomes death unless allies intervene immediately
    trap_severity: lethal rooms and ruthless follow-through
  hook_type: trap_cross
  hook_summary: survive the kill-room
  hook_target: kill-room
  player_blurb: Below the under-river cuts, someone once built for order. What remains
    is Pale Warrens. Every road into the place promises one kind of profit and another
    kind of trouble. If you go, plan around an old guardian that changes how you move,
    old death-traps built to punish haste, and something worth carrying back out.
    A compact delve, but not a harmless one. Openly lethal once the delvers stop paying
    attention. Go down ready to beat the kill-room, or not at all.
  character_motivation: Reach the far side of the worst room in the site without losing
    the delver you brought in.
  pitch_skeleton:
    patron:
      name: Varro Dane
      role: eel trapper
      full: Varro Dane, an eel trapper
      reward: safe passage through the next customs watch
    public_place: the under-river cuts
